{% extends 'base.html' %}
{% load static %}

{% block extra_title %} | Basket{% endblock %}

{% block extra_css %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'basket/css/basket.css' %}">
{% endblock %}

{% block content %}

<section class="page-wrapper mt-4 mb-5">
    <div class="container">
        <h1 class="heading text-uppercase text-center mb-4">Your Basket</h1>
            
        <div class="row g-4">
            <!-- Basket items -->
            <div class="col-12 col-lg-8">
                <div id="basketItems">
                    <!-- Basket item with JavaScript -->
                </div>
            </div>
            
            <!-- Basket summary -->                    
            <div class="col-12 col-lg-4">
                <div class="basket-summary mt-4">
                    <div class="d-flex justify-content-between align-item-center">
                        <h2 class="fs-4 mb-0">Total</h2>
                        <p class="fs-4 mb-0">£<span id="basketTotal">0.00</span></p>
                    </div> 
                    <button class="btn order-btn w-100 mt-3" type="button">
                        Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}

{% block postload_js %}
    {{ block.super }}
    <script src="{% static 'basket/js/basket.js' %}"></script>
{% endblock %}
