<form method="POST" action="" id="payment-form">
    {% csrf_token %}

    <h2 class="fs-5 mb-3">Payment</h2>

    <!-- Checkout progress -->
    <div class="row text-center mb-5 checkout-progress">
        <div class="col-4">
            <i class="bi bi-1-circle-fill"></i>
            <a href="{% url 'checkout' %}" class="text-decoration-none fs-5">Delivery Details</a>
        </div>

        <div class="col-4">
            <i class="bi bi-2-circle"></i>
            <a href="{% url 'delivery_date' order.id %}" class="text-decoration-none fs-5">Delivery Date</a>
        </div>

        <div class="col-4">
            <i class="bi bi-3-circle"></i>
                <span class="fs-5 active">
                    Payment
                </span>
        </div>
    </div>

    <div id="card-element"></div>
    <div id="card-errors" class="text-danger small mt-2" role="alert"></div>

    <button class="btn order-btn mt-3 fs-5" type="submit">
        Complete Payment
    </button>
</form>


{% block postload_js %}
    {{ block.super }}
    <script src="https://js.stripe.com/v3/"></script>
    <script src="{% static 'checkout/js/stripe_elements.js' %}"></script>

    {{ stripe_public_key|json_script:"id_stripe_public_key" }}
    {{ client_secret|json_script:"id_client_secret" }}
{% endblock %}
